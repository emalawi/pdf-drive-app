<!DOCTYPE html>
<html>
<head>
  <title>PDF Drive App</title>
</head>
<body>

<h1>PDF Upload App</h1>

<button onclick="login()">Login with Google</button>
<p id="status">Not logged in</p>

<br><br>

<input type="file" id="fileInput" accept="application/pdf" />
<button onclick="upload()">Upload PDF</button>

<p id="uploadStatus"></p>

<hr>

<h3>Search PDFs</h3>
<input type="text" id="searchInput" placeholder="Enter file name..." />
<button onclick="search()">Search</button>

<ul id="results"></ul>

<script src="https://accounts.google.com/gsi/client"></script>

<script>
let accessToken = "";

// Login
const client = google.accounts.oauth2.initTokenClient({
  client_id: "891941702482-dv3p8elngkqt5af1i0mem3253t1hsdrh.apps.googleusercontent.com",
  scope: "https://www.googleapis.com/auth/drive.file",
  callback: (response) => {
    if (response.access_token) {
      accessToken = response.access_token;
      document.getElementById("status").innerText = "✅ Logged in!";
    }
  }
});

function login() {
  client.requestAccessToken();
}

// Upload
async function upload() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) return alert("Select a PDF");
  if (!accessToken) return alert("Login first");

  document.getElementById("uploadStatus").innerText = "Uploading...";

  const metadata = {
    name: file.name,
    mimeType: "application/pdf"
  };

  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
  form.append("file", file);

  const res = await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {
      method: "POST",
      headers: { Authorization: "Bearer " + accessToken },
      body: form
    }
  );

  const data = await res.json();

  document.getElementById("uploadStatus").innerText =
    "✅ Uploaded: " + file.name;
}

// Search PDFs
async function search() {
  const queryText = document.getElementById("searchInput").value;

  if (!accessToken) return alert("Login first");

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name contains '${queryText}' and mimeType='application/pdf'`,
    {
      headers: {
        Authorization: "Bearer " + accessToken
      }
    }
  );

  const data = await res.json();

  const list = document.getElementById("results");
  list.innerHTML = "";

  data.files.forEach(file => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${file.name}
      <button onclick="download('${file.id}')">Download</button>
    `;
    list.appendChild(li);
  });
}

// Download
function download(fileId) {
  const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
  window.open(url);
}
</script>

</body>
</html>
